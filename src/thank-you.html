    <link id="main-html-main-head-noscript-message-stylesheet-link-2"

      rel="stylesheet">

  <!-- Critical CSS - Prevent FOUC and ensure smooth first paint -->
  <style>
    /* 基础样式 - 防止样式闪烁 */
    html,
    body {
      margin: 0;
      padding: 0;
      background: #ffffff;
      /* 改为白色，避免白屏 */
      color: #0f172a;
      visibility: visible !important;
    }

    /* 评价星星 - 空星 */
    .star_rate {
      opacity: 0.25;
    }

    /* 深色模式基础样式（dark class 在 <html> 上） */
    html.dark,
    html.dark body {
      background: #18151d;
      color: #f1f5f9;
    }

    /* 骨架屏样式 - 确保立即显示 */
    #skeleton-screen {
      position: relative;
      background: #ffffff;
      z-index: 9999;
      /* 提高层级 */
      display: block;
      /* 确保显示 */
      width: 100%;
      min-height: 100vh;
    }

    .dark #skeleton-screen {
      background: #1a202c;
    }

    /* 主容器 - 初始隐藏,防止内容在骨架屏上方显示 */
    #app-container {
      opacity: 0;
      transition: opacity 0.3s ease-in-out;
    }

    #app-container.loaded {
      opacity: 1;
    }

    /* 骨架屏隐藏状态 */
    #skeleton-screen.hidden {
      opacity: 0;
      pointer-events: none;
      visibility: hidden;
      position: absolute;
      height: 0;
      overflow: hidden;
    }

    /* Material Symbols: 隐藏文字直到图标字体加载完成，防止 FOUT */
    .material-symbols-outlined:not(.font-loaded) {
      visibility: hidden;
    }

    /* 浮动侧边栏：CSS 加载前隐藏，防止从普通文档流跳到 fixed 位置导致闪烁 */
    .floating-sidebar,
    .sidebar-indicator {
      visibility: hidden;
    }

    /* 外部 CSS 加载完成后恢复可见（通过 JS 添加 .fouc-ready class） */
    .floating-sidebar.fouc-ready,
    .sidebar-indicator.fouc-ready {
      visibility: visible;
    }

    /* 回到顶部按钮：初始已通过 .hide class 隐藏，无需额外处理 */
    /* 但确保 CSS 加载前 .hide 也正确隐藏 */
    .back-to-top-btn.hide {
      visibility: hidden;
      height: 0;
      overflow: hidden;
      pointer-events: none;
    }

    /* 智能弹窗：内联初始隐藏（外部 CSS 还没加载时防闪现）
       外部 CSS 的 .show { display: flex !important } 会正常覆盖 */
    #smart-popup-overlay {
      display: none;
    }

    /* 骨架屏基础动画 */
    @keyframes skeleton-pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.5;
      }
    }

    .skeleton {
      background-color: #e0e0e0;
      border-radius: 4px;
      animation: skeleton-pulse 1.5s ease-in-out infinite;
    }

    .dark .skeleton {
      background-color: #2d3748;
    }

    .skeleton-text {
      height: 1em;
      margin-bottom: 0.5em;
    }

    .skeleton-title {
      height: 1.5em;
      margin-bottom: 1em;
    }

    .skeleton-button {
      height: 2.5em;
      width: 8em;
      border-radius: 8px;
    }

    .skeleton-image {
      height: 200px;
      width: 100%;
      border-radius: 8px;
    }

    .skeleton-row {
      display: flex;
      gap: 1em;
      margin-bottom: 1em;
    }

    /* Hero 骨架布局 */
    .skeleton-content {
      max-width: 1280px;
      margin: 0 auto;
      padding: 4rem 1rem 2rem;
    }

    .skeleton-hero {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3em;
      min-height: 480px;
    }

    .skeleton-hero-left {
      display: flex;
      flex-direction: column;
      gap: 1em;
    }

    .skeleton-hero-right {
      display: flex;
      flex-direction: column;
      gap: 1em;
    }

    @media (max-width: 1024px) {
      .skeleton-hero {
        grid-template-columns: 1fr;
        min-height: auto;
      }
    }
  
    /* Critical: thank-you skeleton (rendered before Tailwind CSS loads) */
        @keyframes skeleton-pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    #thankyou-skeleton .animate-pulse { animation: skeleton-pulse 1.5s ease-in-out infinite; }
    #thankyou-skeleton .w-24.h-24.rounded-full { width: 6rem; height: 6rem; border-radius: 9999px; }
    #thankyou-skeleton .mb-8 { margin-bottom: 2rem; }
    #thankyou-skeleton .flex { display: flex; }
    #thankyou-skeleton .justify-center { justify-content: center; }
    #thankyou-skeleton .mx-auto { margin-left: auto; margin-right: auto; }
    #thankyou-skeleton .text-center { text-align: center; }
    #thankyou-skeleton .h-10 { height: 2.5rem; }
    #thankyou-skeleton .w-3\/4 { width: 75%; }
    #thankyou-skeleton .h-6 { height: 1.5rem; }
    #thankyou-skeleton .w-full { width: 100%; }
    #thankyou-skeleton .h-5 { height: 1.25rem; }
    #thankyou-skeleton .w-2\/3 { width: 66.666%; }
    #thankyou-skeleton .mb-4 { margin-bottom: 1rem; }
    #thankyou-skeleton .mb-2 { margin-bottom: 0.5rem; }
    #thankyou-skeleton .mb-10 { margin-bottom: 2.5rem; }
    #thankyou-skeleton .gap-4 { gap: 1rem; }
    #thankyou-skeleton .h-12 { height: 3rem; }
    #thankyou-skeleton .w-40 { width: 10rem; }
    #thankyou-skeleton .rounded-lg { border-radius: 0.5rem; }
    #thankyou-skeleton .bg-slate-200 { background-color: #e2e8f0; }
    #thankyou-skeleton .rounded-full { border-radius: 9999px; }
    /* Thank-you section centering */
    #thank-you { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 5rem 1rem; }
    #thankyou-skeleton, #thankyou-content { max-width: 42rem; margin-left: auto; margin-right: auto; text-align: center; }
    /* Fade-in for content */
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fadeIn { animation: fadeIn 0.3s ease-out; }
    /* Header */
    #main-header { display: flex; align-items: center; justify-content: space-between; padding: 0.75rem 1rem; position: sticky; top: 0; z-index: 50; background: #fff; }
    #main-header a { display: flex; align-items: center; gap: 0.75rem; text-decoration: none; color: inherit; }
    #main-header img { height: 2.5rem; }
    #main-header h2 { font-size: 1.125rem; font-weight: 700; white-space: nowrap; }
</style>

  <!-- Critical CSS for above-the-fold content -->
  <!-- CSS will be injected by webpack's style-loader -->

  <!-- 暗色模式早期初始化：在首屏渲染前应用 dark class，防止 FOUC -->
  <script>
    if (localStorage.getItem('darkMode') === 'true') {
      document.documentElement.classList.add('dark');
    }
  </script>
  <script>
// Immediately set language from localStorage/sessionStorage (before bundle.js loads)
(function() {
  console.log('[THANK-YOU PRELOADER] sessionStorage.redirectLang:', sessionStorage.getItem('redirectLang'));
  console.log('[THANK-YOU PRELOADER] localStorage.userLanguage:', localStorage.getItem('userLanguage'));
  
  var sessionLang = sessionStorage.getItem('redirectLang');
  if (sessionLang) sessionStorage.removeItem('redirectLang');
  var userLang = localStorage.getItem('userLanguage');
  var lang = sessionLang || userLang || '';
  
  console.log('[THANK-YOU PRELOADER] decided lang:', lang, '(session:', sessionLang, ', user:', userLang, ')');
  
  if (lang) {
    document.documentElement.lang = lang;
    if (lang === 'ar' || lang === 'he') document.documentElement.dir = 'rtl';
    window.__preloadedLanguage = lang;
  }
})();
</script>
</head>
<body>
<main>
      <header id="main-header"
        class="fixed-header flex items-center justify-between whitespace-nowrap px-4 py-3 lg:px-10">
        <a href="/" id="header-logo" class="flex items-center gap-3 text-primary dark:text-slate-100 hover:opacity-80 transition-opacity">
          <img id="header-logo-img" src="images/logo_html.webp" alt="LOGO" class="h-8 lg:h-10 inline-block align-middle"
            fetchpriority="high" />
          <h2 id="header-logo-company-name-title" class="text-base lg:text-lg font-bold leading-tight tracking-tight"
            data-i18n="company_name">Foshan YuKoLi Technology Co., Ltd.</h2>
        </a>
      </header>
    <section id="thank-you" class=" px-4 py-20 lg:py-32 bg-background-light dark:bg-background-dark min-h-screen flex items-center justify-center">

      <!-- Skeleton (visible until translations load) -->
      <div id="thankyou-skeleton" class="max-w-2xl mx-auto text-center">
        <div class="mb-8 flex justify-center">
          <div class="w-24 h-24 rounded-full bg-slate-200 dark:bg-slate-700 animate-pulse"></div>
        </div>
        <div class="h-10 w-3/4 mx-auto mb-4 rounded-lg bg-slate-200 dark:bg-slate-700 animate-pulse"></div>
        <div class="h-6 w-full mb-2 rounded-lg bg-slate-200 dark:bg-slate-700 animate-pulse"></div>

        <div class="flex gap-4 justify-center">
          <div class="h-12 w-40 rounded-lg bg-slate-200 dark:bg-slate-700 animate-pulse"></div>
          <div class="h-12 w-40 rounded-lg bg-slate-200 dark:bg-slate-700 animate-pulse"></div>

        <div class="mb-8 flex justify-center">
          <div class="w-24 h-24 rounded-full bg-green-100 dark:bg-green-900/30 flex items-center justify-center">
            <svg class="w-12 h-12 text-green-500 dark:text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />

        <p class="text-slate-600 dark:text-slate-400 text-lg mb-2" data-i18n="thankyou_message">我们已收到您的询盘信息，团队将在 24 小时内与您联系。</p>
        <p class="text-slate-500 dark:text-slate-500 text-sm mb-10" data-i18n="thankyou_subtitle">同时，欢迎随时浏览我们的产品系列或直接致电咨询。</p>
        <div class="flex flex-col sm:flex-row gap-4 justify-center">
          <a href="/" id="thankyou-browse-products"
            class="inline-flex items-center justify-center gap-2 px-8 py-3 bg-primary hover:bg-primary-light text-white rounded-lg transition-all duration-300 font-medium text-sm shadow-lg hover:shadow-xl">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4" />
            </svg>
            <span data-i18n="thankyou_btn_products">浏览产品</span>
          </a>
          <a href="/" id="thankyou-back-home"
            class="inline-flex items-center justify-center gap-2 px-8 py-3 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-700 dark:text-slate-300 rounded-lg hover:bg-slate-50 dark:hover:bg-slate-700 transition-all duration-300 font-medium text-sm">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0a1 1 0 01-1-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 01-1 1h-2z" />
            </svg>
            <span data-i18n="thankyou_btn_home">返回首页</span>
          </a>
        </div>
      </div>
    </section>
</main>
<script>
// Thank-you page: hide skeleton, show content after translations load
(function() {
  var skeleton = document.getElementById('thankyou-skeleton');
  var content = document.getElementById('thankyou-content');

  function reveal() {
    console.log('[THANK-YOU] revealing content, hiding skeleton');
    if (skeleton) skeleton.style.display = 'none';
    if (content) content.style.display = '';
  }

  // translationManager may not exist yet (bundle.js is defer)
  // Poll until it appears, then register the event
  function waitForManager() {
    if (window.translationManager) {
      console.log('[THANK-YOU] translationManager found, registering translationsApplied');
      // If translations already loaded (cached), reveal immediately
      if (window.translationManager.translationsCache.has('ui-' + window.translationManager.currentLanguage)) {
        reveal();
      } else {
        window.translationManager.on('translationsApplied', function() {
          reveal();
        });
      }
    } else {
      console.log('[THANK-YOU] translationManager not ready, retrying...');
      setTimeout(waitForManager, 50);
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', waitForManager);
  } else {
    waitForManager();
  }
})();
</script>
</body>
